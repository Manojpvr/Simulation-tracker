<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulation Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #fff; color: #111; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

const STATUSES = [
  { key: "planned", label: "Planned", color: "#6B7280", bg: "#F3F4F6", accent: "#D1D5DB", icon: "\u25C7" },
  { key: "queued", label: "Queued", color: "#D97706", bg: "#FEF3C7", accent: "#FCD34D", icon: "\u25C8" },
  { key: "running", label: "Running", color: "#059669", bg: "#D1FAE5", accent: "#6EE7B7", icon: "\u25B6" },
  { key: "finished", label: "Finished", color: "#2563EB", bg: "#DBEAFE", accent: "#93C5FD", icon: "\u2713" },
  { key: "failed", label: "Failed", color: "#DC2626", bg: "#FEE2E2", accent: "#FCA5A5", icon: "\u2715" },
];
const STATUS_MAP = Object.fromEntries(STATUSES.map((s) => [s.key, s]));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

function planRealization(name, allSims) {
  const match = name.match(/^(.+?)(?:_r(\d+))?$/);
  const base = match[1];
  const hasRSuffix = !!match[2];
  let maxR = 0;
  allSims.forEach((s) => {
    if (s.name === base) maxR = Math.max(maxR, 1);
    const m = s.name.match(/^(.+?)_r(\d+)$/);
    if (m && m[1] === base) maxR = Math.max(maxR, parseInt(m[2], 10));
  });
  const renameOriginal = !hasRSuffix;
  const nextR = Math.max(maxR, 1) + 1;
  return { base, newName: `${base}_r${nextR}`, renameOriginal, originalNewName: `${base}_r1` };
}

const DEFAULT_SIM = { name: "", status: "planned", system: "", forceField: "", ensemble: "", steps: "", notes: "", folderId: null };

// --- Storage helpers (localStorage) ---
function loadData() {
  try { const raw = localStorage.getItem("sim-tracker-v2"); return raw ? JSON.parse(raw) : { sims: [], folders: [] }; }
  catch { return { sims: [], folders: [] }; }
}
function saveData(sims, folders) {
  try { localStorage.setItem("sim-tracker-v2", JSON.stringify({ sims, folders })); } catch {}
}
function exportData(sims, folders) {
  const blob = new Blob([JSON.stringify({ sims, folders }, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = "sim-tracker-backup.json"; a.click();
  URL.revokeObjectURL(url);
}
function importData(onLoad) {
  const input = document.createElement("input"); input.type = "file"; input.accept = ".json";
  input.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { try { const d = JSON.parse(ev.target.result); onLoad(d.sims || [], d.folders || []); } catch { alert("Invalid file"); } };
    reader.readAsText(file);
  };
  input.click();
}

// --- Folder helpers ---
function getFolderPath(folders, id) {
  const parts = []; let cur = id;
  while (cur) { const f = folders.find((x) => x.id === cur); if (!f) break; parts.unshift(f.name); cur = f.parentId; }
  return parts.join(" / ");
}
function getDescendantIds(folders, parentId) {
  const ids = [parentId];
  folders.filter((f) => f.parentId === parentId).forEach((c) => ids.push(...getDescendantIds(folders, c.id)));
  return ids;
}
function flatFolderOptions(folders, parentId = null, depth = 0) {
  const out = [];
  folders.filter((f) => f.parentId === parentId).sort((a, b) => a.name.localeCompare(b.name)).forEach((f) => {
    out.push({ id: f.id, name: f.name, depth });
    out.push(...flatFolderOptions(folders, f.id, depth + 1));
  });
  return out;
}

// --- Components ---
function Badge({ status, small }) {
  const s = STATUS_MAP[status];
  return <span style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: small ? "1px 8px" : "2px 10px", borderRadius: 4, fontSize: small ? 11 : 12, fontWeight: 600, letterSpacing: "0.03em", color: s.color, background: s.bg, border: `1px solid ${s.accent}`, fontFamily: "'SF Mono','Fira Code','Cascadia Code',monospace" }}><span style={{ fontSize: small ? 9 : 11 }}>{s.icon}</span>{s.label}</span>;
}

function StatBar({ sims }) {
  const counts = {}; STATUSES.forEach((s) => (counts[s.key] = 0)); sims.forEach((sim) => counts[sim.status]++);
  const total = sims.length || 1;
  return <div style={{ display: "flex", gap: 2, height: 6, borderRadius: 3, overflow: "hidden", background: "#E5E7EB" }}>{STATUSES.map((s) => counts[s.key] > 0 ? <div key={s.key} title={`${s.label}: ${counts[s.key]}`} style={{ flex: counts[s.key] / total, background: s.color, transition: "flex 0.3s" }} /> : null)}</div>;
}

function FolderTree({ folders, sims, selected, onSelect, onAdd, onRename, onDelete }) {
  const countIn = (fid) => { const ids = fid === null ? [null] : getDescendantIds(folders, fid); return sims.filter((s) => ids.includes(s.folderId)).length; };
  const renderLevel = (parentId, depth = 0) => {
    return folders.filter((f) => f.parentId === parentId).sort((a, b) => a.name.localeCompare(b.name)).map((f) => {
      const isSel = selected === f.id, count = countIn(f.id), hasCh = folders.some((x) => x.parentId === f.id);
      return (
        <div key={f.id}>
          <div onClick={() => onSelect(f.id)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 8px", paddingLeft: 8 + depth * 16, borderRadius: 4, cursor: "pointer", background: isSel ? "#EFF6FF" : "transparent", color: isSel ? "#2563EB" : "#333", fontWeight: isSel ? 600 : 400, fontSize: 13, transition: "background 0.1s" }} onMouseEnter={(e) => { if (!isSel) e.currentTarget.style.background = "#F3F4F6"; }} onMouseLeave={(e) => { if (!isSel) e.currentTarget.style.background = "transparent"; }}>
            <span style={{ fontSize: 13, opacity: 0.7 }}>{hasCh ? "\uD83D\uDCC2" : "\uD83D\uDCC1"}</span>
            <span style={{ flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{f.name}</span>
            <span style={{ fontSize: 10, color: "#9CA3AF", fontWeight: 500 }}>{count}</span>
            <span style={{ display: "flex", gap: 2, opacity: 0.4 }}>
              <button onClick={(e) => { e.stopPropagation(); const n = prompt("Rename folder:", f.name); if (n?.trim()) onRename(f.id, n.trim()); }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 11, color: "inherit", padding: "0 2px" }} title="Rename">{"\u270E"}</button>
              <button onClick={(e) => { e.stopPropagation(); if (confirm(`Delete "${f.name}" and move its sims to parent?`)) onDelete(f.id); }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 11, color: "inherit", padding: "0 2px" }} title="Delete">{"\u00D7"}</button>
            </span>
          </div>
          {renderLevel(f.id, depth + 1)}
        </div>
      );
    });
  };
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 1 }}>
      <div onClick={() => onSelect("__all__")} style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 8px", borderRadius: 4, cursor: "pointer", background: selected === "__all__" ? "#EFF6FF" : "transparent", color: selected === "__all__" ? "#2563EB" : "#333", fontWeight: selected === "__all__" ? 600 : 400, fontSize: 13 }}>
        <span style={{ fontSize: 13, opacity: 0.7 }}>{"\uD83D\uDDC2"}</span><span style={{ flex: 1 }}>All Simulations</span><span style={{ fontSize: 10, color: "#9CA3AF", fontWeight: 500 }}>{sims.length}</span>
      </div>
      <div onClick={() => onSelect(null)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 8px", borderRadius: 4, cursor: "pointer", background: selected === null ? "#EFF6FF" : "transparent", color: selected === null ? "#2563EB" : "#333", fontWeight: selected === null ? 600 : 400, fontSize: 13 }}>
        <span style={{ fontSize: 13, opacity: 0.7 }}>{"\uD83D\uDCC4"}</span><span style={{ flex: 1 }}>Unfiled</span><span style={{ fontSize: 10, color: "#9CA3AF", fontWeight: 500 }}>{sims.filter((s) => !s.folderId).length}</span>
      </div>
      {renderLevel(null)}
      <button onClick={onAdd} style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 8px", borderRadius: 4, cursor: "pointer", background: "none", border: "none", color: "#9CA3AF", fontSize: 12, marginTop: 4, textAlign: "left" }}><span>+</span> New folder</button>
    </div>
  );
}

function SimCard({ sim, folders, onEdit, onStatusChange, onDelete, onMove, onDuplicate, onCopy, copied }) {
  return (
    <div style={{ background: "#fff", border: copied ? "1px solid #93C5FD" : "1px solid #E5E7EB", borderLeft: `3px solid ${STATUS_MAP[sim.status].color}`, borderRadius: 6, padding: "10px 12px", cursor: "pointer", transition: "box-shadow 0.15s", boxShadow: copied ? "0 0 0 2px #DBEAFE" : "none" }} onClick={() => onEdit(sim)} onMouseEnter={(e) => { if (!copied) e.currentTarget.style.boxShadow = "0 2px 8px rgba(0,0,0,0.08)"; }} onMouseLeave={(e) => { if (!copied) e.currentTarget.style.boxShadow = "none"; }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
        <span style={{ fontWeight: 600, fontSize: 13, color: "#111", lineHeight: 1.3, wordBreak: "break-word" }}>{sim.name || "Untitled"}</span>
        <span style={{ display: "flex", gap: 2, flexShrink: 0 }}>
          <button onClick={(e) => { e.stopPropagation(); onCopy(sim); }} title="Copy (paste into a folder to add as a new version)" style={{ background: "none", border: "none", color: copied ? "#2563EB" : "#9CA3AF", cursor: "pointer", fontSize: 12, padding: "0 2px", lineHeight: 1 }}>{"\u2398"}</button>
          <button onClick={(e) => { e.stopPropagation(); onDuplicate(sim); }} title="Duplicate as new realization" style={{ background: "none", border: "none", color: "#9CA3AF", cursor: "pointer", fontSize: 12, padding: "0 2px", lineHeight: 1 }}>{"\u29C9"}</button>
          <button onClick={(e) => { e.stopPropagation(); onDelete(sim.id); }} title="Delete" style={{ background: "none", border: "none", color: "#9CA3AF", cursor: "pointer", fontSize: 14, padding: "0 2px", lineHeight: 1 }}>{"\u00D7"}</button>
        </span>
      </div>
      {sim.system && <div style={{ fontSize: 11, color: "#6B7280", marginTop: 4, fontFamily: "monospace" }}>{sim.system}{sim.forceField ? ` \u00B7 ${sim.forceField}` : ""}</div>}
      {sim.ensemble && <div style={{ fontSize: 11, color: "#6B7280", marginTop: 2 }}>{sim.ensemble}{sim.steps ? ` \u00B7 ${sim.steps} steps` : ""}</div>}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8, gap: 6, flexWrap: "wrap" }}>
        <Badge status={sim.status} small />
        <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
          <select value={sim.folderId || ""} onChange={(e) => { e.stopPropagation(); onMove(sim.id, e.target.value || null); }} onClick={(e) => e.stopPropagation()} style={{ fontSize: 10, padding: "1px 4px", border: "1px solid #D1D5DB", borderRadius: 3, background: "#fff", color: "#6B7280", cursor: "pointer", maxWidth: 90 }}>
            <option value="">Unfiled</option>
            {flatFolderOptions(folders).map((f) => <option key={f.id} value={f.id}>{"  ".repeat(f.depth) + f.name}</option>)}
          </select>
          <select value={sim.status} onChange={(e) => { e.stopPropagation(); onStatusChange(sim.id, e.target.value); }} onClick={(e) => e.stopPropagation()} style={{ fontSize: 10, padding: "1px 4px", border: "1px solid #D1D5DB", borderRadius: 3, background: "#fff", color: "#6B7280", cursor: "pointer" }}>
            {STATUSES.map((s) => <option key={s.key} value={s.key}>{"\u2192"} {s.label}</option>)}
          </select>
        </div>
      </div>
      {sim.notes && <div style={{ fontSize: 11, color: "#6B7280", marginTop: 6, paddingTop: 6, borderTop: "1px dashed #E5E7EB", lineHeight: 1.4, whiteSpace: "pre-wrap", maxHeight: 60, overflow: "hidden" }}>{sim.notes}</div>}
    </div>
  );
}

function SimForm({ sim, folders, onSave, onCancel }) {
  const [form, setForm] = useState({ ...DEFAULT_SIM, ...sim });
  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));
  const inp = { width: "100%", padding: "6px 8px", border: "1px solid #D1D5DB", borderRadius: 4, fontSize: 13, background: "#fff", color: "#111", boxSizing: "border-box", fontFamily: "inherit" };
  const lbl = { fontSize: 11, fontWeight: 600, color: "#6B7280", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 3, display: "block" };
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.35)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 16 }} onClick={onCancel}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: "#fff", borderRadius: 8, padding: 20, width: "100%", maxWidth: 440, maxHeight: "90vh", overflowY: "auto", boxShadow: "0 8px 32px rgba(0,0,0,0.18)" }}>
        <h3 style={{ margin: "0 0 16px", fontSize: 16, color: "#111" }}>{sim?.id ? "Edit Simulation" : "New Simulation"}</h3>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <div><label style={lbl}>Name</label><input style={inp} value={form.name} onChange={(e) => set("name", e.target.value)} placeholder="e.g. Kapitza_NEMD_450K_run3" autoFocus /></div>
          <div><label style={lbl}>Folder</label><select style={inp} value={form.folderId || ""} onChange={(e) => set("folderId", e.target.value || null)}><option value="">Unfiled</option>{flatFolderOptions(folders).map((f) => <option key={f.id} value={f.id}>{"  ".repeat(f.depth) + f.name}</option>)}</select></div>
          <div><label style={lbl}>Status</label><div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>{STATUSES.map((s) => <button key={s.key} onClick={() => set("status", s.key)} style={{ padding: "4px 12px", borderRadius: 4, border: form.status === s.key ? `2px solid ${s.color}` : "1px solid #D1D5DB", background: form.status === s.key ? s.bg : "transparent", color: form.status === s.key ? s.color : "#6B7280", fontWeight: form.status === s.key ? 700 : 400, fontSize: 12, cursor: "pointer" }}>{s.icon} {s.label}</button>)}</div></div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <div><label style={lbl}>System</label><input style={inp} value={form.system} onChange={(e) => set("system", e.target.value)} placeholder="e.g. Kapton/DGEBA-BER" /></div>
            <div><label style={lbl}>Force Field</label><input style={inp} value={form.forceField} onChange={(e) => set("forceField", e.target.value)} placeholder="e.g. PCFF" /></div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <div><label style={lbl}>Ensemble / Method</label><input style={inp} value={form.ensemble} onChange={(e) => set("ensemble", e.target.value)} placeholder="e.g. NEMD Langevin" /></div>
            <div><label style={lbl}>Timesteps</label><input style={inp} value={form.steps} onChange={(e) => set("steps", e.target.value)} placeholder="e.g. 5M" /></div>
          </div>
          <div><label style={lbl}>Notes</label><textarea style={{ ...inp, minHeight: 60, resize: "vertical" }} value={form.notes} onChange={(e) => set("notes", e.target.value)} placeholder="Job ID, parameters, observations..." /></div>
        </div>
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 16 }}>
          <button onClick={onCancel} style={{ padding: "6px 16px", borderRadius: 4, border: "1px solid #D1D5DB", background: "transparent", color: "#6B7280", fontSize: 13, cursor: "pointer" }}>Cancel</button>
          <button onClick={() => { if (!form.name.trim()) return; onSave({ ...form, id: form.id || uid(), created: form.created || Date.now() }); }} style={{ padding: "6px 20px", borderRadius: 4, border: "none", background: "#2563EB", color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer", opacity: form.name.trim() ? 1 : 0.4 }}>{sim?.id ? "Save" : "Add"}</button>
        </div>
      </div>
    </div>
  );
}

function NewFolderModal({ folders, onSave, onCancel }) {
  const [name, setName] = useState("");
  const [parentId, setParentId] = useState(null);
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.35)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 16 }} onClick={onCancel}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: "#fff", borderRadius: 8, padding: 20, width: "100%", maxWidth: 340, boxShadow: "0 8px 32px rgba(0,0,0,0.18)" }}>
        <h3 style={{ margin: "0 0 12px", fontSize: 15, color: "#111" }}>New Folder</h3>
        <input autoFocus value={name} onChange={(e) => setName(e.target.value)} placeholder="Folder name" style={{ width: "100%", padding: "6px 8px", border: "1px solid #D1D5DB", borderRadius: 4, fontSize: 13, marginBottom: 10, boxSizing: "border-box" }} onKeyDown={(e) => { if (e.key === "Enter" && name.trim()) onSave({ id: uid(), name: name.trim(), parentId }); }} />
        <select value={parentId || ""} onChange={(e) => setParentId(e.target.value || null)} style={{ width: "100%", padding: "6px 8px", border: "1px solid #D1D5DB", borderRadius: 4, fontSize: 13, marginBottom: 14, boxSizing: "border-box" }}>
          <option value="">Root level</option>
          {flatFolderOptions(folders).map((f) => <option key={f.id} value={f.id}>{"  ".repeat(f.depth) + f.name}</option>)}
        </select>
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
          <button onClick={onCancel} style={{ padding: "6px 16px", borderRadius: 4, border: "1px solid #D1D5DB", background: "transparent", color: "#6B7280", fontSize: 13, cursor: "pointer" }}>Cancel</button>
          <button onClick={() => { if (name.trim()) onSave({ id: uid(), name: name.trim(), parentId }); }} style={{ padding: "6px 16px", borderRadius: 4, border: "none", background: "#2563EB", color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer", opacity: name.trim() ? 1 : 0.4 }}>Create</button>
        </div>
      </div>
    </div>
  );
}

function SimTracker() {
  const [sims, setSims] = useState([]);
  const [folders, setFolders] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [editing, setEditing] = useState(null);
  const [addingFolder, setAddingFolder] = useState(false);
  const [selectedFolder, setSelectedFolder] = useState("__all__");
  const [clipboard, setClipboard] = useState(null);
  const [view, setView] = useState("list");
  const [statusFilter, setStatusFilter] = useState("all");
  const [sidebarOpen, setSidebarOpen] = useState(true);

  useEffect(() => {
    const d = loadData();
    setSims(d.sims); setFolders(d.folders); setLoaded(true);
  }, []);

  const persist = useCallback((ns, nf) => {
    setSims(ns); setFolders(nf); saveData(ns, nf);
  }, []);

  const saveSim = (sim) => { const next = sims.some((s) => s.id === sim.id) ? sims.map((s) => (s.id === sim.id ? sim : s)) : [...sims, sim]; persist(next, folders); setEditing(null); };
  const chStatus = (id, st) => persist(sims.map((s) => (s.id === id ? { ...s, status: st } : s)), folders);
  const delSim = (id) => persist(sims.filter((s) => s.id !== id), folders);
  const dupSim = (sim) => {
    const plan = planRealization(sim.name, sims);
    let updated = sims;
    if (plan.renameOriginal) {
      updated = updated.map((s) => s.id === sim.id ? { ...s, name: plan.originalNewName } : s);
    }
    const dup = { ...sim, id: uid(), name: plan.newName, status: "planned", created: Date.now(), notes: sim.notes ? `Realization of ${plan.base}\n${sim.notes}` : `Realization of ${plan.base}` };
    persist([...updated, dup], folders);
  };
  const moveSim = (id, fid) => persist(sims.map((s) => (s.id === id ? { ...s, folderId: fid } : s)), folders);
  const copySim = (sim) => setClipboard(sim);
  const pasteSim = () => {
    if (!clipboard) return;
    const target = selectedFolder === "__all__" ? null : selectedFolder;
    const inFolder = sims.filter((s) => s.folderId === target);
    const exists = inFolder.some((s) => s.name === clipboard.name);
    let updated = sims;
    const pasted = { ...clipboard, id: uid(), folderId: target, created: Date.now() };
    if (exists) {
      const plan = planRealization(clipboard.name, inFolder);
      if (plan.renameOriginal) {
        updated = updated.map((s) => (s.folderId === target && s.name === clipboard.name ? { ...s, name: plan.originalNewName } : s));
      }
      pasted.name = plan.newName;
      pasted.notes = clipboard.notes ? `Version of ${plan.base}\n${clipboard.notes}` : `Version of ${plan.base}`;
    }
    persist([...updated, pasted], folders);
  };
  const addFolder = (f) => { persist(sims, [...folders, f]); setAddingFolder(false); };
  const renFolder = (id, name) => persist(sims, folders.map((f) => (f.id === id ? { ...f, name } : f)));
  const delFolder = (id) => {
    const f = folders.find((x) => x.id === id); const pid = f?.parentId || null;
    persist(sims.map((s) => (s.folderId === id ? { ...s, folderId: pid } : s)), folders.filter((x) => x.id !== id).map((x) => (x.parentId === id ? { ...x, parentId: pid } : x)));
    if (selectedFolder === id) setSelectedFolder("__all__");
  };
  const reset = () => { if (confirm("Clear everything?")) persist([], []); };
  const handleImport = () => { importData((s, f) => persist(s, f)); };

  const visible = useMemo(() => {
    let list = sims;
    if (selectedFolder === "__all__") {} else if (selectedFolder === null) { list = list.filter((s) => !s.folderId); } else { const ids = getDescendantIds(folders, selectedFolder); list = list.filter((s) => ids.includes(s.folderId)); }
    if (statusFilter !== "all") list = list.filter((s) => s.status === statusFilter);
    return list;
  }, [sims, folders, selectedFolder, statusFilter]);

  const counts = {}; STATUSES.forEach((s) => (counts[s.key] = 0)); visible.forEach((s) => counts[s.status]++);
  if (!loaded) return <div style={{ padding: 40, textAlign: "center", color: "#9CA3AF" }}>Loading…</div>;
  const title = selectedFolder === "__all__" ? "All Simulations" : selectedFolder === null ? "Unfiled" : getFolderPath(folders, selectedFolder);

  return (
    <div style={{ fontFamily: "'Inter',system-ui,-apple-system,sans-serif", color: "#111", display: "flex", height: "100vh" }}>
      {sidebarOpen && (
        <div style={{ width: 220, minWidth: 180, borderRight: "1px solid #E5E7EB", padding: "12px 8px", overflowY: "auto", flexShrink: 0, background: "#FAFAFA" }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#9CA3AF", textTransform: "uppercase", letterSpacing: "0.06em", padding: "0 8px 8px" }}>Folders</div>
          <FolderTree folders={folders} sims={sims} selected={selectedFolder} onSelect={setSelectedFolder} onAdd={() => setAddingFolder(true)} onRename={renFolder} onDelete={delFolder} />
        </div>
      )}
      <div style={{ flex: 1, padding: "12px 16px", overflowY: "auto", minWidth: 0 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 8, marginBottom: 10 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <button onClick={() => setSidebarOpen(!sidebarOpen)} style={{ background: "none", border: "1px solid #D1D5DB", borderRadius: 4, cursor: "pointer", padding: "3px 7px", fontSize: 14, color: "#6B7280" }} title="Toggle sidebar">{sidebarOpen ? "\u25C0" : "\u25B6"}</button>
            <div>
              <h1 style={{ margin: 0, fontSize: 18, fontWeight: 700, letterSpacing: "-0.02em" }}>{title}</h1>
              <p style={{ margin: "2px 0 0", fontSize: 12, color: "#6B7280" }}>{visible.length} sim{visible.length !== 1 ? "s" : ""} {"\u00B7"} {visible.filter((s) => s.status === "running").length} running</p>
            </div>
          </div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {clipboard && (
              <button onClick={pasteSim} title={`Paste "${clipboard.name}" into ${title}` + (sims.some((s) => s.folderId === (selectedFolder === "__all__" ? null : selectedFolder) && s.name === clipboard.name) ? " as a new version" : "")} style={{ display: "flex", alignItems: "center", gap: 4, padding: "5px 10px", borderRadius: 4, border: "1px solid #93C5FD", background: "#EFF6FF", color: "#2563EB", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>{"\u2397"} Paste <span style={{ maxWidth: 90, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", opacity: 0.75 }}>{clipboard.name}</span><span onClick={(e) => { e.stopPropagation(); setClipboard(null); }} title="Clear clipboard" style={{ marginLeft: 2, opacity: 0.6 }}>{"\u00D7"}</span></button>
            )}
            <button onClick={() => exportData(sims, folders)} style={{ padding: "5px 10px", borderRadius: 4, border: "1px solid #D1D5DB", background: "transparent", color: "#9CA3AF", fontSize: 11, cursor: "pointer" }} title="Export JSON">{"\u2B07"} Export</button>
            <button onClick={handleImport} style={{ padding: "5px 10px", borderRadius: 4, border: "1px solid #D1D5DB", background: "transparent", color: "#9CA3AF", fontSize: 11, cursor: "pointer" }} title="Import JSON">{"\u2B06"} Import</button>
            <button onClick={reset} style={{ padding: "5px 12px", borderRadius: 4, border: "1px solid #D1D5DB", background: "transparent", color: "#9CA3AF", fontSize: 12, cursor: "pointer" }}>Reset</button>
            <button onClick={() => setEditing({ folderId: selectedFolder === "__all__" ? null : selectedFolder })} style={{ padding: "5px 16px", borderRadius: 4, border: "none", background: "#2563EB", color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>+ Add</button>
          </div>
        </div>
        <StatBar sims={visible} />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10, marginBottom: 10, flexWrap: "wrap", gap: 6 }}>
          <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
            <button onClick={() => setStatusFilter("all")} style={{ padding: "3px 10px", borderRadius: 4, border: statusFilter === "all" ? "1px solid #2563EB" : "1px solid #D1D5DB", background: statusFilter === "all" ? "#EFF6FF" : "transparent", color: statusFilter === "all" ? "#2563EB" : "#6B7280", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>All ({visible.length})</button>
            {STATUSES.map((s) => <button key={s.key} onClick={() => setStatusFilter(s.key)} style={{ padding: "3px 10px", borderRadius: 4, border: statusFilter === s.key ? `1px solid ${s.color}` : "1px solid #D1D5DB", background: statusFilter === s.key ? s.bg : "transparent", color: statusFilter === s.key ? s.color : "#6B7280", fontSize: 11, fontWeight: 500, cursor: "pointer" }}>{s.icon} {counts[s.key]}</button>)}
          </div>
          <div style={{ display: "flex", gap: 2 }}>
            {["board", "list"].map((v) => <button key={v} onClick={() => setView(v)} style={{ padding: "3px 10px", borderRadius: 4, border: `1px solid ${view === v ? "#2563EB" : "#D1D5DB"}`, background: view === v ? "#EFF6FF" : "transparent", color: view === v ? "#2563EB" : "#6B7280", fontSize: 11, fontWeight: 500, cursor: "pointer" }}>{v === "board" ? "\u25A6 Board" : "\u2261 List"}</button>)}
          </div>
        </div>
        {view === "board" && (
          <div style={{ display: "grid", gridTemplateColumns: `repeat(${STATUSES.length}, 1fr)`, gap: 8, overflowX: "auto" }}>
            {STATUSES.map((s) => {
              const col = visible.filter((sim) => sim.status === s.key);
              return <div key={s.key} style={{ minWidth: 140, background: `color-mix(in srgb, ${s.bg} 40%, transparent)`, borderRadius: 6, padding: 8 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8, padding: "0 2px" }}><span style={{ fontSize: 12, color: s.color }}>{s.icon}</span><span style={{ fontSize: 12, fontWeight: 700, color: s.color }}>{s.label}</span><span style={{ fontSize: 10, color: s.color, background: s.bg, borderRadius: 8, padding: "0 6px", fontWeight: 600 }}>{col.length}</span></div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>{col.map((sim) => <SimCard key={sim.id} sim={sim} folders={folders} onEdit={setEditing} onStatusChange={chStatus} onDelete={delSim} onMove={moveSim} onDuplicate={dupSim} onCopy={copySim} copied={clipboard?.id === sim.id} />)}{col.length === 0 && <div style={{ padding: "16px 8px", textAlign: "center", fontSize: 11, color: "#9CA3AF" }}>{"\u2014"}</div>}</div>
              </div>;
            })}
          </div>
        )}
        {view === "list" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {visible.length === 0 && <div style={{ padding: 32, textAlign: "center", color: "#9CA3AF", fontSize: 13 }}>No simulations here yet. Click + Add to create one.</div>}
            {visible.map((sim) => <SimCard key={sim.id} sim={sim} folders={folders} onEdit={setEditing} onStatusChange={chStatus} onDelete={delSim} onMove={moveSim} onDuplicate={dupSim} onCopy={copySim} copied={clipboard?.id === sim.id} />)}
          </div>
        )}
      </div>
      {editing !== null && <SimForm sim={editing} folders={folders} onSave={saveSim} onCancel={() => setEditing(null)} />}
      {addingFolder && <NewFolderModal folders={folders} onSave={addFolder} onCancel={() => setAddingFolder(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<SimTracker />);
</script>
</body>
</html>
